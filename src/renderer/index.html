<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src https://api.open-meteo.com">
  <title>Routine Aesthetic</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <div class="app">
    <!-- TOP: Immersive Header Bar -->
    <header class="top-bar">
      <canvas class="clouds-canvas" id="clouds-canvas"></canvas>

      <!-- Weather Display (left) -->
      <div class="weather-section">
        <canvas class="weather-icon-canvas" id="weather-icon" width="32" height="32"></canvas>
        <div class="weather-info">
          <span class="weather-temp" id="weather-temp">--&deg;</span>
          <span class="weather-condition" id="weather-condition">LOADING...</span>
        </div>
        <div class="weather-location" id="weather-location"></div>
      </div>

      <!-- Center: Greeting / Date -->
      <div class="top-center">
        <span class="greeting-text" id="greeting-text">GOOD MORNING</span>
        <span class="greeting-date" id="greeting-date"></span>
      </div>

      <!-- Lofi Music Player (right) -->
      <div class="lofi-section">
        <div class="lofi-art">
          <canvas id="lofi-art-canvas" width="36" height="36"></canvas>
        </div>
        <div class="lofi-info">
          <span class="lofi-label">LOFI</span>
          <span class="lofi-track" id="lofi-track">Pixel Dreams</span>
        </div>
        <div class="lofi-controls">
          <button class="lofi-btn" id="lofi-prev" title="Previous">&#9664;&#9664;</button>
          <button class="lofi-btn lofi-play-btn" id="lofi-play" title="Play">&#9654;</button>
          <button class="lofi-btn" id="lofi-next" title="Next">&#9654;&#9654;</button>
        </div>
        <div class="lofi-volume">
          <span class="lofi-vol-icon">&#9834;</span>
          <input type="range" class="lofi-vol-slider" id="lofi-volume" min="0" max="100" value="40">
        </div>
        <div class="equalizer" id="equalizer">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
      </div>
    </header>

    <!-- MAIN: 3-Column Layout -->
    <div class="main-content">
      <!-- LEFT: Timer Panel -->
      <aside class="panel timer-panel">
        <h2 class="panel-title">TIMER</h2>

        <div class="pixel-mascot">
          <canvas id="mascot-canvas" width="32" height="32"></canvas>
        </div>

        <div class="timer-display">
          <canvas id="timer-canvas" width="180" height="180"></canvas>
          <div class="timer-text" id="timer-text">25:00</div>
        </div>

        <div class="timer-mode">
          <button class="mode-btn active" data-mode="work">WORK</button>
          <button class="mode-btn" data-mode="break">BREAK</button>
        </div>

        <div class="timer-controls">
          <button class="pixel-btn" id="btn-start">START</button>
          <button class="pixel-btn" id="btn-pause" disabled>PAUSE</button>
          <button class="pixel-btn" id="btn-reset">RESET</button>
        </div>

        <div class="shortcut-hint">[SPACE] START/PAUSE &middot; [R] RESET</div>

        <div class="pixel-separator"></div>

        <div class="timer-linked">
          <span class="label">LINKED TASK:</span>
          <span class="linked-task-name" id="linked-task">None</span>
        </div>

        <div class="timer-stats">
          <div class="stat">
            <span class="stat-label">SESSIONS</span>
            <span class="stat-value" id="session-count">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">TOTAL</span>
            <span class="stat-value" id="total-time">0m</span>
          </div>
        </div>
      </aside>

      <!-- CENTER: Calendar -->
      <main class="panel calendar-panel">
        <div class="calendar-header">
          <button class="nav-btn" id="prev-month">&lt;</button>
          <h2 class="month-title" id="month-title">APRIL 2026</h2>
          <button class="nav-btn" id="next-month">&gt;</button>
        </div>

        <div class="calendar-sub-header">
          <button class="today-btn" id="btn-today">TODAY</button>
        </div>

        <div class="calendar-weekdays">
          <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
        </div>

        <div class="calendar-grid" id="calendar-grid">
          <!-- Generated by JS -->
        </div>
      </main>

      <!-- RIGHT: Task Panel -->
      <aside class="panel task-panel">
        <h2 class="panel-title">TASKS <span class="selected-date" id="selected-date-label">APR 13</span></h2>

        <div class="search-bar" id="search-bar">
          <input type="text" class="pixel-input search-input" id="search-input" placeholder="Search tasks...">
          <button class="pixel-btn search-action-btn" id="search-go" title="Search">&#128269;</button>
          <button class="pixel-btn search-action-btn search-clear-btn" id="search-clear" title="Clear search">&#10005;</button>
        </div>

        <div class="task-list" id="task-list">
          <!-- Generated by JS -->
        </div>

        <div class="task-form" id="task-form">
          <h3 class="form-title" id="form-title">NEW TASK</h3>
          <input type="text" class="pixel-input" id="task-title" placeholder="Task title...">
          <textarea class="pixel-input" id="task-desc" placeholder="Description..." rows="2"></textarea>
          <div class="form-row">
            <input type="time" class="pixel-input" id="task-time">
            <select class="pixel-input" id="task-priority">
              <option value="low">LOW</option>
              <option value="medium" selected>MED</option>
              <option value="high">HIGH</option>
            </select>
          </div>
          <div class="form-row">
            <label class="pixel-toggle">
              <input type="checkbox" id="task-reminder">
              <span class="toggle-label">REMINDER</span>
            </label>
          </div>
          <div class="form-actions">
            <button class="pixel-btn save-btn" id="btn-save-task">SAVE</button>
            <button class="pixel-btn cancel-btn" id="btn-cancel-task">CANCEL</button>
          </div>
        </div>

        <button class="pixel-btn add-task-btn" id="btn-add-task">+ NEW TASK</button>

        <div class="shortcut-hint">[/] SEARCH &middot; [N] NEW &middot; [ESC] CLOSE</div>
      </aside>
    </div>
  </div>

  <!-- Notification toast -->
  <div class="toast" id="toast"></div>

  <!-- Reminder Popup Overlay -->
  <div class="reminder-overlay" id="reminder-overlay">
    <div class="reminder-popup" id="reminder-popup">
      <!-- Pixel corner accents -->
      <div class="rp-corner rp-tl"></div>
      <div class="rp-corner rp-tr"></div>
      <div class="rp-corner rp-bl"></div>
      <div class="rp-corner rp-br"></div>

      <!-- Animated bell -->
      <div class="rp-bell-wrap">
        <canvas id="rp-bell-canvas" width="32" height="32"></canvas>
        <div class="rp-ring-particles" id="rp-ring-particles"></div>
      </div>

      <!-- Content -->
      <div class="rp-header">REMINDER</div>
      <div class="rp-title" id="rp-title">Task Title</div>
      <div class="rp-desc" id="rp-desc"></div>
      <div class="rp-time" id="rp-time">NOW</div>

      <!-- Auto-dismiss progress bar -->
      <div class="rp-progress-track">
        <div class="rp-progress-bar" id="rp-progress-bar"></div>
      </div>

      <!-- Actions -->
      <div class="rp-actions">
        <button class="pixel-btn rp-btn rp-done-btn" id="rp-done">DONE</button>
        <button class="pixel-btn rp-btn rp-snooze-btn" id="rp-snooze5">+5 MIN</button>
        <button class="pixel-btn rp-btn rp-snooze-btn" id="rp-snooze10">+10 MIN</button>
        <button class="pixel-btn rp-btn rp-dismiss-btn" id="rp-dismiss">DISMISS</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
